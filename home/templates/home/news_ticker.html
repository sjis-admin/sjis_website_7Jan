<style>
    /* Modern News Ticker - Microsoft Fluent Style */
    .ticker-container {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        color: white;
        height: 48px;
        position: fixed;
        top: calc(5rem + env(safe-area-inset-top)); /* h-20 mobile header */
        left: 0;
        right: 0;
        overflow: hidden;
        z-index: 45; /* Below header z-50 */
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
    }

    @media (min-width: 1024px) {
        .ticker-container {
            top: calc(6rem + env(safe-area-inset-top)); /* h-24 desktop header */
        }
    }

    .ticker-label {
        background: #0ea5e9;
        color: white;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0 1.5rem;
        height: 100%;
        display: flex;
        align-items: center;
        z-index: 50;
        position: relative;
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.2);
    }

    .ticker-label::after {
        content: '';
        position: absolute;
        right: -10px;
        top: 0;
        border-top: 24px solid transparent;
        border-bottom: 24px solid transparent;
        border-left: 10px solid #0ea5e9;
    }

    .ticker-wrapper {
        flex: 1;
        overflow: hidden;
        position: relative;
    }

    .ticker {
        white-space: nowrap;
        display: inline-block;
        padding-left: 100%;
        animation: tickerScroll 35s linear infinite;
    }

    .ticker:hover {
        animation-play-state: paused;
    }

    .ticker-item {
        display: inline-block;
        padding: 0 3rem;
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .ticker-item:hover {
        color: #0ea5e9;
    }

    .live-dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        margin-right: 10px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.5; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes tickerScroll {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-100%, 0, 0); }
    }

    /* Padding for main content */
    #main-content {
        padding-top: calc(5rem + 48px + env(safe-area-inset-top));
    }

    @media (min-width: 1024px) {
        #main-content {
            padding-top: calc(6rem + 48px + env(safe-area-inset-top));
        }
    }
</style>

<!-- News Ticker -->
<div class="ticker-container">
    <div class="ticker-label">
        <span class="live-dot"></span>
        Latest News
    </div>
    <div class="ticker-wrapper">
        <div class="ticker">
            {% for notice in notices %}
            <a href="{% url 'notice_board2:detail' notice.pk %}" class="ticker-item">
                <span class="text-brand-400 mr-2">/</span> {{ notice.title }}
            </a>
            {% empty %}
            <span class="ticker-item">Welcome to St. Joseph International School - Admissions are open for the 2024-25 session.</span>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const ticker = document.querySelector('.ticker');
        if (ticker) {
            ticker.innerHTML += ticker.innerHTML; // Duplicate for seamless scroll
        }
    });
</script>
