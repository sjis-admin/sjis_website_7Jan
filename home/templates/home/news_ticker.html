<style>
    /* Dropdown styles */
    .desktop-dropdown-content {
        z-index: 1001;
        /* Higher than header but lower than ticker */
    }

    /* News Ticker styles */
    .ticker-container {
        background-color: #05445E;
        color: white;
        height: 40px;
        position: fixed;
        top: 5rem;
        /* 80px = h-20 mobile header */
        left: 0;
        right: 0;
        overflow: hidden;
        z-index: 40;
        /* Just below header (z-50) */
    }

    @media (min-width: 768px) {
        .ticker-container {
            top: 6rem;
            /* 96px = h-24 desktop header */
        }
    }

    .ticker-label {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        padding: 0 20px;
        background: linear-gradient(135deg, #1A5F7A, #127490);
        font-weight: bold;
        z-index: 50;
        color: white;
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        border-right: 2px solid rgba(255, 255, 255, 0.1);
    }

    .ticker-wrapper {
        display: flex;
        align-items: center;
        height: 100%;
        padding-left: 150px;
    }

    .ticker {
        white-space: nowrap;
        display: inline-block;
        padding-left: 100%;
        animation: ticker 40s linear infinite;
    }

    .ticker:hover {
        animation-play-state: paused;
    }

    .ticker-item {
        display: inline-block;
        padding: 0 2rem;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .ticker-item:hover {
        color: #8CDBF4;
        text-decoration: none;
    }


    @keyframes ticker {
        0% {
            transform: translate3d(0, 0, 0);
        }

        100% {
            transform: translate3d(-100%, 0, 0);
        }
    }

    /* Main content adjustment */
    main {
        margin-top: calc(5rem + 40px);
        /* Mobile: Header height (80px) + ticker height (40px) = 120px */
    }

    @media (min-width: 768px) {
        main {
            margin-top: calc(6rem + 40px);
            /* Desktop: Header height (96px) + ticker height (40px) = 136px */
        }
    }
</style>

<!-- News Ticker -->
<div class="ticker-container">
    <div class="ticker-label">NOTICE</div>
    <div class="ticker-wrapper">
        <div class="ticker">
            {% for notice in notices %}
            <a href="{% url 'notice_board2:detail' notice.pk %}" class="ticker-item">{{ notice.title }}</a>
            {% endfor %}
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        // Duplicate ticker content for seamless scrolling
        const ticker = document.querySelector('.ticker');
        if (ticker) {
            ticker.innerHTML += ticker.innerHTML;
        }

        // Handle dropdown z-index dynamically
        const dropdowns = document.querySelectorAll('.desktop-dropdown');
        dropdowns.forEach(dropdown => {
            dropdown.addEventListener('mouseenter', () => {
                const content = dropdown.querySelector('.desktop-dropdown-content');
                if (content) content.style.zIndex = '1001';
            });
            dropdown.addEventListener('mouseleave', () => {
                const content = dropdown.querySelector('.desktop-dropdown-content');
                if (content) content.style.zIndex = '1001';
            });
        });
    });
</script>
