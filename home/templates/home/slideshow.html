{% load static %}

<style>
    /* Premium Microsoft Fluent Slider */
    .premium-slider {
        position: relative;
        width: 100%;
        height: 100svh;   /* safe area on iOS */
        min-height: 520px;
        overflow: hidden;
        background: #020617;
    }

    /* Loading Skeleton for slow connections */
    .premium-slider::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, 
            transparent 0%, 
            rgba(255,255,255,0.03) 50%, 
            transparent 100%);
        background-size: 200% 100%;
        animation: slideSkeleton 2s infinite linear;
        z-index: 0;
    }

    @keyframes slideSkeleton {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    @media (max-width: 768px) {
        .premium-slider {
            height: 100svh;
            min-height: 480px;
        }
    }

    .swiper-container {
        width: 100%;
        height: 100%;
    }

    .swiper-slide {
        position: relative;
        overflow: hidden;
    }

    /* Enhanced Ken Burns - Zoom + Subtle Pan */
    .slide-image {
        position: absolute;
        inset: 0;
        z-index: 1;
    }

    .slide-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        animation: kenBurns 25s ease-in-out infinite alternate;
        transform-origin: center;
        will-change: transform;
    }

    @keyframes kenBurns {
        0% { transform: scale(1) translateX(0); }
        100% { transform: scale(1.15) translateX(2%); }
    }

    /* Modern Navigation Capsules */
    .nav-capsule {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 50;
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%; /* Circle for more modern look */
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .nav-capsule:hover {
        background: #0ea5e9;
        border-color: #0ea5e9;
        transform: translateY(-50%) scale(1.1);
    }

    .nav-capsule.prev { left: 16px; }
    .nav-capsule.next { right: 16px; }

    @media (max-width: 640px) {
        .nav-capsule { width: 44px; height: 44px; }
        .nav-capsule.prev { left: 8px; }
        .nav-capsule.next { right: 8px; }
    }

    @media (min-width: 1024px) {
        .nav-capsule { width: 64px; height: 64px; }
        .nav-capsule.prev { left: 40px; }
        .nav-capsule.next { right: 40px; }
    }

    /* Swiper dot bullets */
    .swiper-pagination-bullet {
        background: rgba(255,255,255,0.7) !important;
        width: 10px !important;
        height: 10px !important;
        transition: all 0.3s ease !important;
    }
    .swiper-pagination-bullet-active {
        background: #0ea5e9 !important;
        width: 32px !important;
        border-radius: 5px !important;
    }
    .swiper-pagination {
        bottom: 2rem !important;
    }
</style>

<div class="premium-slider group">
    <div class="swiper-container">
        <div class="swiper-wrapper">
            {% for image in images %}
            <div class="swiper-slide">
                <!-- Optimized Image Layer -->
                <div class="slide-image">
                    <img src="{{ image.image.url }}" 
                         alt="{{ image.caption|default:'SJIS Campus' }}"
                         {% if forloop.first %}fetchpriority="high"{% else %}loading="lazy"{% endif %}
                         class="w-full h-full object-cover">
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Pagination dots (visible on mobile) -->
    <div class="swiper-pagination"></div>

    <!-- Navigation -->
    <div class="nav-capsule prev swiper-btn-prev">
        <i class="ri-arrow-left-s-line text-2xl"></i>
    </div>
    <div class="nav-capsule next swiper-btn-next">
        <i class="ri-arrow-right-s-line text-2xl"></i>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        new Swiper('.swiper-container', {
            loop: true,
            speed: 1200,
            effect: 'fade',
            fadeEffect: { crossFade: true },
            autoplay: {
                delay: 6000,
                disableOnInteraction: false,
                pauseOnMouseEnter: true,
            },
            navigation: {
                nextEl: '.swiper-btn-next',
                prevEl: '.swiper-btn-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
                dynamicBullets: true,
            },
            a11y: { enabled: true },
            grabCursor: true,
        });
    });
</script>
